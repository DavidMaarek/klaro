# =============================================================================
# Nginx config for the klaro container.
# Replaces the legacy /etc/nginx/sites-available/klaro.davidmaarek.fr.conf
#
# What we dropped (now handled by Traefik):
#   - listen 443 ssl + ssl_certificate         → Traefik terminates HTTPS
#   - HTTP→HTTPS redirect                      → Traefik middleware
#   - access_log / error_log to files          → container logs to stdout/stderr
#
# What we kept and improved:
#   - SPA fallback (was: error_page 404 /;)    → cleaner: try_files
#   - Long cache for hashed assets             → big perf win for Angular
#   - No-cache for index.html                  → users always get the latest
# =============================================================================

server {
    # Écoute sur IPv4 ET IPv6 :
    #   - IPv4 : pour Traefik et les requêtes externes
    #   - IPv6 : pour que les healthchecks Docker (qui résolvent localhost
    #     en ::1 sur Alpine) puissent atteindre nginx
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown route serves index.html so Angular Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets (Angular adds content hashes to filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html — it's how users discover new asset hashes.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Optional: tell nginx to gzip on the fly (small files only).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
