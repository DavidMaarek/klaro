# =============================================================================
# Nginx config for the klaro container.
# Replaces the legacy /etc/nginx/sites-available/klaro.davidmaarek.fr.conf
#
# What we dropped (now handled by Traefik):
#   - listen 443 ssl + ssl_certificate         → Traefik terminates HTTPS
#   - HTTP→HTTPS redirect                      → Traefik middleware
#   - access_log / error_log to files          → container logs to stdout/stderr
#
# What we kept and improved:
#   - SPA fallback (was: error_page 404 /;)    → cleaner: try_files
#   - Long cache for hashed assets             → big perf win for Angular
#   - No-cache for index.html                  → users always get the latest
# =============================================================================

# Masque la version exacte de nginx dans le header `Server:`. Par défaut nginx
# envoie `Server: nginx/1.27.X` — avec server_tokens off, c'est juste `nginx`.
# Petit gain sécu (l'attaquant ne sait pas quelle version cibler pour exploiter
# des CVE liées à une version précise).
server_tokens off;

server {
    # Écoute sur IPv4 ET IPv6 :
    #   - IPv4 : pour Traefik et les requêtes externes
    #   - IPv6 : pour que les healthchecks Docker (qui résolvent localhost
    #     en ::1 sur Alpine) puissent atteindre nginx
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback : toute URL qui n'est pas un fichier existant sert index.html
    # pour que Angular Router prenne la main côté client.
    #
    # On évite `try_files $uri $uri/ /index.html` (le pattern classique) parce
    # que `$uri/` déclenche un redirect 301 automatique de nginx quand l'URL
    # n'a pas de trailing slash mais qu'un dossier existe (ex: /assets → 301
    # /assets/). Ce 301 est en http:// et caché par les browsers — sale.
    # En sautant directement à /index.html, on garde le pattern SPA propre.
    location / {
        try_files $uri /index.html;
    }

    # Long cache for hashed assets (Angular adds content hashes to filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html — it's how users discover new asset hashes.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Optional: tell nginx to gzip on the fly (small files only).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
