name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/davidmaarek/klaro
  SERVICE_NAME: vps_klaro-davidmaarek-fr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # required to push to GHCR with the built-in GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # Met à jour le service Swarm en pointant sur le SHA de ce commit.
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Le short SHA doit être calculé dans le runner GHA (pas dans le SSH
      # script où GITHUB_SHA n'existe pas).
      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: githubactions
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            docker service update \
              --image ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.short_sha }} \
              --with-registry-auth \
              ${{ env.SERVICE_NAME }}
